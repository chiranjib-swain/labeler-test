name: "1331 PR check uses only-issue-types "
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Make sure PRs are in scope
          stale-issue-message: "stale pr"
          days-before-issue-stale: 200

          # This triggers the buggy behavior
          only-issue-types: bug

          # Optional, but useful to see logs
          debug-only: true
          
          # PRs: disable completely (won’t mark/comment/close PRs)
          days-before-pr-stale: -1
          days-before-pr-close: -1

