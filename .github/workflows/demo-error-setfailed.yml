name: Demo - error + setFailed (strict, fails the job)

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR numbers (try: 999999, abc, -1, 0)'
        required: true
        default: '30'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Run labeler with mixed input
        uses: chiranjib-swain/labeler@demo/error-with-setfailed
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: |
            ${{ github.event.inputs.pr-number }}
            abc
            -1

# EXPECTED RESULT:
# - Job: RED ❌  (exits non-zero — setFailed causes job failure)
# - Annotations: red ❌ error for 'abc' (fails on first invalid, stops)
# - Valid PR is NOT labeled — nothing is processed
# - PROOF: breaking change vs current behavior
