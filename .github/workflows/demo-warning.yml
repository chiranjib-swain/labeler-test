name: Demo - warning (current behavior)

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR numbers (try: 999999, abc, -1, 0)'
        required: true
        default: '30'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Run labeler with mixed input
        uses: chiranjib-swain/labeler@fix/pr-number-validation-logic
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: |
            ${{ github.event.inputs.pr-number }}
            abc
            -1

# EXPECTED RESULT:
# - Job: GREEN ✅  (exits 0)
# - Annotations: 2x yellow ⚠️ warnings for 'abc' and '-1'
# - Valid PR (if any) still gets labeled
